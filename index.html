<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>कायझेन फॅमिली रेस्टॉरंट</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: serif;
      text-align: center;
      overflow: hidden;
    }

    .welcome-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%, 100% { letter-spacing: 3px; opacity: 0.7; }
      50%       { letter-spacing: 6px; opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    @keyframes fadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    .brand-name {
      font-size: 28px;
      color: #c8a96e;
      letter-spacing: 3px;
      line-height: 1.5;
      animation: fadeInUp 1s ease 0.1s both, shimmer 3s ease-in-out 1.5s infinite;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #c8a96e;
      margin: 16px auto;
      animation: fadeInUp 1s ease 0.3s both;
    }

    .welcome-text {
      font-size: 20px;
      color: #f0e6d3;
      animation: fadeInUp 1s ease 0.6s both;
    }

    .dots {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      animation: fadeInUp 1s ease 0.9s both;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c8a96e;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    .loading-text {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      letter-spacing: 1px;
      animation: fadeInUp 1s ease 1.1s both, pulse 2s ease-in-out 2s infinite;
    }

    .tap-btn {
      margin-top: 28px;
      padding: 12px 28px;
      background: transparent;
      border: 1px solid #c8a96e;
      color: #c8a96e;
      font-size: 15px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 1px;
      font-family: serif;
      animation: fadeInUp 1s ease 1.3s both;
      -webkit-tap-highlight-color: transparent;
    }

    .tap-btn:active {
      background: #c8a96e;
      color: #1a1a1a;
    }

    body.fading {
      animation: fadeOut 0.6s ease forwards;
    }
  </style>
</head>
<body>

  <div class="welcome-wrap">
    <div class="brand-name">कायझेन फॅमिली रेस्टॉरंट</div>
    <div class="divider"></div>
    <div class="welcome-text">मध्ये आपले स्वागत आहे</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="loading-text">मेनू लोड होत आहे...</div>
    <button class="tap-btn" onclick="openPDF()">मेनू पहा →</button>
  </div>

  <script>
    function openPDF() {
      document.body.classList.add('fading');
      setTimeout(function () {
        window.location.href = "myfile.pdf";
      }, 600);
    }

    // Auto redirect after 4 seconds on desktop
    // On mobile the button is also there as fallback
    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (!isMobile) {
      setTimeout(openPDF, 4000);
    }
  </script>

</body>
</html>
